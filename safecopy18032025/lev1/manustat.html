<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Statistiche Manutenzione</title>
  <link rel="icon" href="data:,">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }
    h1, h2, h3 {
      text-align: center;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .form-group button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .form-group button:hover {
      background-color: #0056b3;
    }
    .charts-container {
      margin-top: 40px;
    }
    .chart {
      margin-bottom: 40px;
    }
    canvas {
      width: 100% !important;
      height: 400px !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Statistiche Manutenzione</h1>
    <div class="form-group">
      <label for="period">Seleziona il periodo</label>
      <input type="text" id="period" class="datepicker" readonly>
    </div>
    <div class="form-group">
      <label for="manutentori">Seleziona i manutentori</label>
      <select id="manutentori" multiple>
        <!-- Manutentori saranno caricati dinamicamente -->
      </select>
    </div>
    <div class="form-group">
      <button id="generateStats">Genera Statistiche</button>
    </div>
    <div class="charts-container">
      <div class="chart">
        <h2>Distribuzione Ore Lavorate</h2>
        <canvas id="oreLavorateChart"></canvas>
      </div>
      <div class="chart">
        <h2>Stato Manutenzioni</h2>
        <canvas id="statoManutenzioniChart"></canvas>
      </div>
      <div class="chart">
        <h2>Tempi Medi di Chiusura Manutenzioni</h2>
        <canvas id="tempiMediChiusuraChart"></canvas>
      </div>
    </div>
  </div>
  <script src="manustat.js"></script>
</body>
</html>
