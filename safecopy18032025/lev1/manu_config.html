<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Configurazione Manutenzione - Sistema Gestione Manutenzioni</title>
  <link rel="icon" href="data:,">
  <script type="module" src="manu_config.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow-y: auto;
    }
    .form-container {
      background-color: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: auto;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
      white-space: pre-line;
    }
    .subtitle {
      font-size: 18px;
      text-align: center;
      margin-bottom: 20px;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    .input-row {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .input-row label {
      font-weight: bold;
      color: #555;
      margin-right: 10px;
    }
    .input-row input {
      flex: 1;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    .turno-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .turno-row label {
      margin-right: 10px;
      white-space: nowrap;
    }
    .turno-row input {
      width: calc(20% - 10px);
    }
    button {
      background-color: #007bff;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
    button:hover {
      background-color: #0056b3;
    }
    .error-message {
      color: #dc3545;
      margin-top: 10px;
      text-align: center;
    }
    .success-message {
      color: #28a745;
      margin-top: 10px;
      text-align: center;
    }
    .footer {
      font-size: 12px;
      color: #888;
      text-align: left;
    }
    .navigation {
      text-align: center;
      margin-top: 20px;
    }
    .navigation button {
      width: auto;
      padding: 10px 20px;
      margin: 5px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }
    th {
      background-color: #f2f2f2;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>CASEIFICIO TONON<br><span class="subtitle">Configurazione Manutenzione</span></h1>
    <table id="manutentoriTable">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Cognome</th>
          <th>Email</th>
          <th>Numero di cellulare</th>
          <th>Reperibilità</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
    <form id="configForm">
      <div class="input-row">
        <label for="oreGiornaliere">Ore giornaliere lavorabili:</label>
        <input type="number" id="oreGiornaliere" required>
      </div>
      <div class="turno-row">
        <label for="turnoA">Turno A:</label>
        <input type="text" id="turnoA1" placeholder="Dalle" required>
        <input type="text" id="turnoA2" placeholder="Alle" required>
        <input type="text" id="turnoA3" placeholder="Dalle" required>
        <input type="text" id="turnoA4" placeholder="Alle" required>
      </div>
      <div class="turno-row">
        <label for="turnoB">Turno B:</label>
        <input type="text" id="turnoB1" placeholder="Dalle" required>
        <input type="text" id="turnoB2" placeholder="Alle" required>
        <input type="text" id="turnoB3" placeholder="Dalle" required>
        <input type="text" id="turnoB4" placeholder="Alle" required>
      </div>
      <div class="turno-row">
        <label for="turnoC">Turno C:</label>
        <input type="text" id="turnoC1" placeholder="Dalle" required>
        <input type="text" id="turnoC2" placeholder="Alle" required>
        <input type="text" id="turnoC3" placeholder="Dalle" required>
        <input type="text" id="turnoC4" placeholder="Alle" required>
      </div>
      <div class="turno-row">
        <label for="turnoG">Turno G:</label>
        <input type="text" id="turnoG1" placeholder="Dalle" required>
        <input type="text" id="turnoG2" placeholder="Alle" required>
        <input type="text" id="turnoG3" placeholder="Dalle" required>
        <input type="text" id="turnoG4" placeholder="Alle" required>
      </div>
      <div class="input-row">
        <label for="pausa">Pausa giornaliera (in minuti):</label>
        <input type="number" id="pausa" required>
      </div>
      <button type="submit">Salva Configurazione</button>
    </form>
    <div id="message" class="error-message"></div>
    <div class="navigation">
      <button onclick="window.location.href='welcome.html'">Home</button>
      <button onclick="window.location.href='add_manutentori.html'">Aggiungi Manutentore</button>
    </div>
    <div class="footer">
      &copy; 2025 Sistema Gestione Manutenzioni.<br>Created by Francesco Mussi.
    </div>
  </div>
</body>
</html>
