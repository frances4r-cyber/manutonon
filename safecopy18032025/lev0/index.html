<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema Gestione Manutenzioni</title>
  <link rel="icon" href="data:,">
  <script type="module" src="login.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container {
      background-color: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 350px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 400px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
      white-space: pre-line;
    }
    .subtitle {
      font-size: 22px;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-top: 10px;
      font-weight: bold;
      color: #555;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      background-color: #007bff;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
    button:hover {
      background-color: #0056b3;
    }
    .error-message {
      color: #dc3545;
      margin-top: 10px;
      text-align: center;
    }
    .footer {
      font-size: 12px;
      color: #888;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>CASEIFICIO TONON<br><span class="subtitle">REPARTI<br> UTEC / MANUTENZIONE</span></h1>
    <form id="loginForm">
      <label for="email">Email:</label>
      <input type="email" id="email" required>
      <label for="password">Password:</label>
      <input type="password" id="password" required>
      <button type="submit">Accedi</button>
    </form>
    <div id="errorMessage" class="error-message"></div>
    <div class="footer">
      &copy; 2025 Sistema Gestione Manutenzioni.<br>Created by Francesco Mussi.
    </div>
  </div>
</body>
</html>
