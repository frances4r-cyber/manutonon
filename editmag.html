<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Modifica Ricambio</title>
    <link rel="icon" href="data:,">
    <script type="module" src="editmag.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: auto;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #555;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        input[type="text"], input[type="number"], input[type="date"] {
            box-sizing: border-box;
        }
        button {
            background-color: #28a745;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        .navigation {
            text-align: center;
            margin-top: 20px;
        }
        .navigation button {
            width: auto;
            padding: 10px 20px;
            margin: 5px;
        }
        .delete-button {
            background-color: #dc3545;
        }
        .delete-button:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <h1>Modifica Ricambio</h1>
    <div class="navigation">
        <button onclick="window.location.href='magdb.html'">Torna a Magazzino Ricambi</button>
    </div>
    <form id="editRicambiForm">
        <label for="codInt">COD. INT.:</label>
        <input type="text" id="codInt" readonly>
        <label for="codFor">COD. FOR.:</label>
        <input type="text" id="codFor" required>
        <label for="descrizione">Descrizione:</label>
        <input type="text" id="descrizione" required>
        <label for="destinazione">Destinazione:</label>
        <input type="text" id="destinazione" required>
        <label for="tipo">Tipo:</label>
        <select id="tipo" required>
            <option value="CONS">CONS</option>
            <option value="RIC">RIC</option>
            <option value="GARANZIA">GARANZIA</option>
        </select>
        <label for="fornitore">Fornitore:</label>
        <input type="text" id="fornitore" required>
        <label for="qtaResidua">Q.tà residua:</label>
        <input type="number" step="0.01" id="qtaResidua" required>
        <label for="costo">Costo unit.:</label>
        <input type="number" step="0.01" id="costo" required>
        <button type="submit">Salva</button>
        <button type="button" class="delete-button" id="deleteButton">Elimina</button>
    </form>
</body>
</html>
